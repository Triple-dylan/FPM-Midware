services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fpm
      POSTGRES_PASSWORD: fpm
      POSTGRES_DB: fpm_datatool
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpm -d fpm_datatool"]
      interval: 3s
      timeout: 5s
      retries: 10
